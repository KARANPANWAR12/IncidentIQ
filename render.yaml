services:
  - type: web
    name: incidentiq
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: MYSQLHOST
        sync: false

      - key: MYSQLPORT
        sync: false

      - key: MYSQLDATABASE
        sync: false

      - key: MYSQLUSER
        sync: false

      - key: MYSQLPASSWORD
        sync: false